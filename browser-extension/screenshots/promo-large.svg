    <text x="50" y="296" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#120a1e">3</text>
    <text x="90" y="296" font-family="sans-serif" font-size="16" font-weight="700" fill="#ede4ff">Abra o X LARP</text>
